version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:14-alpine
    container_name: teamsync-postgres
    environment:
      POSTGRES_DB: teamsync_db
      POSTGRES_USER: teamsync_user
      POSTGRES_PASSWORD: teamsync_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - teamsync-network
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:6-alpine
    container_name: teamsync-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - teamsync-network
    restart: unless-stopped

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: teamsync-backend
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://teamsync_user:teamsync_password@postgres:5432/teamsync_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-this-in-production}
      JWT_EXPIRES_IN: 7d
      FRONTEND_URL: http://nginx
    ports:
      - "5000:5000"
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - teamsync-network
    restart: unless-stopped
    command: npm start

  # Frontend React App
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: teamsync-frontend
    networks:
      - teamsync-network
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: teamsync-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend
    networks:
      - teamsync-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  teamsync-network:
    driver: bridge